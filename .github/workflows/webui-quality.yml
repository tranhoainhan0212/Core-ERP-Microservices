name: WebUI Quality Gate

on:
  push:
    paths:
      - 'src/WebUI/**'
      - '.github/workflows/webui-quality.yml'
  pull_request:
    paths:
      - 'src/WebUI/**'
      - '.github/workflows/webui-quality.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/WebUI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/WebUI/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Quality Check
        run: npm run quality:check
